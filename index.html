<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Heart Interaction</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        /* Heart Icon with continuous idle beat */
        .heart {
            font-size: 100px;
            color: #ff3e6c;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.1s ease;
            animation: idleBeat 1s infinite alternate;
        }

        /* Active shake effect triggered by the beat/spacebar */
        .heart.shake {
            animation: beatShake 0.15s ease-in-out;
        }

        /* Spacebar UI styling */
        .spacebar-icon {
            margin-top: 30px;
            display: inline-block;
            padding: 10px 40px;
            border: 3px solid #ffffff;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 0 #bcbcbc;
            transition: all 0.05s ease;
            user-select: none;
        }

        .spacebar-icon.pressed {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #bcbcbc;
            background: rgba(255, 255, 255, 0.3);
        }

        .instructions {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }

        /* Animations */
        @keyframes idleBeat {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        @keyframes beatShake {
            0% { transform: scale(1.3) rotate(0deg); }
            25% { transform: scale(1.2) rotate(-10deg); }
            75% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Heart Icon (Using a text emoji for simplicity, can be replaced with an SVG) -->
        <div id="heart" class="heart">❤️</div>
        
        <br>
        
        <!-- Spacebar Indicator -->
        <div id="spacebar" class="spacebar-icon">SPACE</div>
        
        <p class="instructions">Press Spacebar 5 times to complete the rhythm!</p>
    </div>

    <script>
        const heart = document.getElementById('heart');
        const spacebar = document.getElementById('spacebar');
        
        // Target sound URL provided
        const completionSound = new Audio('https://cdn.pixabay.com/download/audio/2026/01/08/audio_36abbc084f.mp3?filename=dragon-studio-angelical-synth-pad-463203.mp3');

        let pressCount = 0;
        const targetPresses = 5; // Change this to adjust when the game is "done"
        let isDone = false;

        function triggerBeat() {
            if (isDone) return;

            // Trigger visual button press
            spacebar.classList.add('pressed');
            
            // Trigger heart shake animation
            heart.classList.remove('shake');
            void heart.offsetWidth; // Trigger reflow to restart animation
            heart.classList.add('shake');

            pressCount++;

            // Check if user is finished
            if (pressCount >= targetPresses) {
                isDone = true;
                playCompletionAudio();
            }
        }

        function releaseBeat() {
            spacebar.classList.remove('pressed');
        }

        function playCompletionAudio() {
            completionSound.play()
                .then(() => {
                    alert('Finished! Playing completion sound.');
                })
                .catch(error => {
                    console.log("Audio playback failed due to browser policies. Click the screen first.", error);
                });
        }

        // Keyboard listeners
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Prevent page from scrolling down
                if (!e.repeat) {
                    triggerBeat();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                releaseBeat();
            }
        });

        // Mouse click support for testing
        spacebar.addEventListener('mousedown', triggerBeat);
        spacebar.addEventListener('mouseup', releaseBeat);
    </script>
</body>
</html>
